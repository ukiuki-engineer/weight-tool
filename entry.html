<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>体重入力</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container" id="app" v-cloak>
    <header class="header">
      <div>
        <h1>体重入力</h1>
        <p>日々の測定値を記録します。同じ日付は上書きされます。</p>
      </div>
      <div class="authArea">
        <a class="navLink" href="./index.html">グラフページへ</a>
        <span class="userEmail">{{ user?.email }}</span>
        <button v-if="!user" type="button" class="authButton" @click="handleLogin">Googleでログイン</button>
        <button v-else type="button" class="authButton" @click="logout">ログアウト</button>
      </div>
    </header>

    <section v-if="!ready" class="loginNotice">
      <p>{{ message }}</p>
    </section>

    <div v-show="ready">
      <section class="entryCard">
        <form class="entryForm" @submit.prevent="handleSave">
          <label>
            日付
            <input type="date" v-model="entryDate" required />
          </label>
          <label>
            体重[kg]
            <input type="number" v-model.number="entryWeight" step="0.1" min="20" max="300" required />
          </label>
          <button type="submit" class="saveButton" :disabled="saving">保存</button>
          <span class="entryStatus">{{ status }}</span>
        </form>
      </section>

      <section class="notes">
        <h2>直近の記録</h2>
        <table class="recordTable">
          <tbody>
            <tr v-for="row in recentRecords" :key="row.date">
              <td>{{ row.date }}</td>
              <td class="recordWeight">{{ row.weight.toFixed(1) }} kg</td>
            </tr>
          </tbody>
        </table>
        <p v-if="recentRecords.length === 0" class="recordEmpty">まだ記録がありません。</p>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
  <script type="module" src="./entry-page.js"></script>
</body>
</html>
